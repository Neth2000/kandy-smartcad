<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard – Kandy SmartCad</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="api-config.js"></script>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="kmc-header">

  <div class="kmc-logo">
    Kandy<br>
    <span>Municipal Council</span>
  </div>

  <nav class="kmc-nav">
    <a href="admin-dashboard.html" id="navAll">All Submissions</a>
    <a href="admin-dashboard.html?status=approved" id="navApproved">Approved</a>
    <a href="admin-dashboard.html?status=rejected" id="navRejected">Rejected</a>
    <a href="admin-dashboard.html?status=committee" id="navCommittee">Planning Committee</a>
    <a href="admin-dashboard.html?status=final_approved" id="navFinalApproved">Final Approved</a>
    <a href="admin-employees.html" id="navEmployees">Employees</a>
  </nav>

  <!-- USER PROFILE (RIGHT SIDE) -->
  <div class="admin-profile">
    <span id="adminName">Admin</span>
    <div class="profile-circle" id="adminInitial">A</div>
    <button id="adminLogoutBtn" class="btn-logout" type="button">&#x2192; Sign Out</button>
  </div>

</header>


<!-- ===== MAIN ===== -->
<main class="main">

  <h2 id="pageTitle">All Submissions</h2>

  <div class="panel">

    <table class="admin-table">
      <thead>
        <tr>
          <th>Reference Number</th>
          <th>Date</th>
          <th>Applicant</th>
          <th>Documents</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="applicationsTableBody">
        <tr>
          <td colspan="6">Loading submissions...</td>
        </tr>
      </tbody>
    </table>

  </div>

</main>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const adminData = localStorage.getItem("admin_user");
  const tableBody = document.getElementById("applicationsTableBody");
  const adminName = document.getElementById("adminName");
  const adminInitial = document.getElementById("adminInitial");
  const adminLogoutBtn = document.getElementById("adminLogoutBtn");

  if (!adminData) {
    window.location.href = "index.html";
    return;
  }

  // Read optional status filter from URL
  const urlParams = new URLSearchParams(window.location.search);
  const statusFilter = urlParams.get("status") || "";

  // Set active nav tab and page title
  const STATUS_LABELS = {
    "": "All Submissions",
    "approved": "Approved Applications",
    "rejected": "Rejected Applications",
    "committee": "Planning Committee",
    "final_approved": "Final Approved"
  };
  const NAV_IDS = {
    "": "navAll",
    "approved": "navApproved",
    "rejected": "navRejected",
    "committee": "navCommittee",
    "final_approved": "navFinalApproved"
  };
  document.getElementById("pageTitle").textContent = STATUS_LABELS[statusFilter] || "All Submissions";
  const activeNavId = NAV_IDS[statusFilter] || "navAll";
  const activeNav = document.getElementById(activeNavId);
  if (activeNav) activeNav.classList.add("active-tab");

  let admin;
  try {
    admin = JSON.parse(adminData);
    const displayName = admin.display_name || admin.username || "Admin";
    adminName.textContent = displayName;
    adminInitial.textContent = displayName.charAt(0).toUpperCase();
  } catch (error) {
    localStorage.removeItem("admin_user");
    window.location.href = "index.html";
    return;
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function formatDate(value) {
    if (!value) {
      return "-";
    }

    return new Date(value).toLocaleDateString();
  }

  async function loadApplications() {
    try {
      const url = statusFilter
        ? `${API_BASE}/admin/applications?status=${encodeURIComponent(statusFilter)}`
        : `${API_BASE}/admin/applications`;
      const response = await fetch(url);

      if (!response.ok) {
        throw new Error("Unable to load submissions");
      }

      const applications = await response.json();

      if (applications.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="6">No submissions found.</td></tr>';
        return;
      }

      tableBody.innerHTML = applications.map((application) => `
        <tr>
          <td>${escapeHtml(application.reference_no || "Pending")}</td>
          <td>${escapeHtml(formatDate(application.created_at))}</td>
          <td>${escapeHtml(application.phone || "-")}</td>
          <td>${escapeHtml(application.document_count || 0)}</td>
          <td>${escapeHtml(application.status || "pending")}</td>
          <td>
            <button class="btn-primary small-btn" onclick="window.location.href='admin-review.html?ref=${encodeURIComponent(application.reference_no || "")}'">
              Open
            </button>
          </td>
        </tr>
      `).join("");
    } catch (error) {
      tableBody.innerHTML = '<tr><td colspan="6">Failed to load submissions.</td></tr>';
    }
  }

  adminLogoutBtn.addEventListener("click", () => {
    localStorage.removeItem("admin_user");
    window.location.href = "index.html";
  });

  loadApplications();
});


</script>

</body>
</html>
