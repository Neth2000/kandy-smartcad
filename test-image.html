<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Image Test</title>
</head>
<body>

  <h2>Image Test Page</h2>

  <p>This is a direct test from a simple HTML file.</p>

 <img src="support-diagram.png" alt="Local test image">
<script>
document.addEventListener("DOMContentLoaded", () => {

  const toggle = document.getElementById("servicesToggle");
  const menu = document.getElementById("servicesMenu");

  toggle.addEventListener("click", (e) => {
    e.stopPropagation(); // prevent auto close
    menu.classList.toggle("show");
  });

  menu.addEventListener("click", (e) => {
    e.stopPropagation(); // keep open when clicking inside
  });

  // Close dropdown when clicking anywhere else
  document.addEventListener("click", () => {
    menu.classList.remove("show");
  });

});
</script>

  <script src="user-session-strip.js"></script>
</body>
</html>
