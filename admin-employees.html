<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Employee Management – Kandy SmartCad</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="api-config.js"></script>
  <style>
    .emp-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .emp-table th, .emp-table td { padding: 10px 14px; border-bottom: 1px solid #e2e8f0; text-align: left; }
    .emp-table th { background: #f8f8fb; font-weight: 600; color: #4a4a6a; }
    .emp-table tr:hover td { background: #f4f3ff; }
    .badge-role { display:inline-block; padding:2px 10px; border-radius:20px; font-size:0.78rem; font-weight:600; }
    .badge-super { background:#e8e0ff; color:#5b21b6; }
    .badge-officer { background:#dbeafe; color:#1d4ed8; }
    .badge-active { background:#dcfce7; color:#166534; font-size:0.78rem; padding:2px 8px; border-radius:20px; }
    .badge-inactive { background:#fee2e2; color:#991b1b; font-size:0.78rem; padding:2px 8px; border-radius:20px; }

    .emp-form-panel { background:#fff; border:1px solid #ddd; border-radius:10px; padding:24px 28px; max-width:540px; margin-bottom:30px; }
    .emp-form-panel h3 { margin-top:0; color:#3b2fa0; font-size:1.05rem; }
    .emp-form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .emp-form-row.single { grid-template-columns:1fr; }
    .emp-form-group { display:flex; flex-direction:column; gap:4px; margin-bottom:2px; }
    .emp-form-group label { font-size:0.82rem; font-weight:600; color:#555; }
    .emp-form-group input, .emp-form-group select { padding:8px 10px; border:1px solid #ccc; border-radius:6px; font-size:0.9rem; font-family:inherit; }
    .emp-form-group input:focus, .emp-form-group select:focus { outline:none; border-color:#7c5cbf; box-shadow:0 0 0 2px #e8e0ff; }
    .emp-msg { margin-top:10px; font-size:0.85rem; min-height:18px; }
    #addBtn { margin-top:14px; }

    .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .section-header h2 { margin:0; font-size:1.1rem; color:#3b2fa0; }

    .super-only-notice { background:#fff8e1; border:1px solid #f6c000; border-radius:8px; padding:12px 16px; font-size:0.88rem; color:#7a5900; margin-bottom:20px; }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="kmc-header">
  <div class="kmc-logo">
    Kandy<br>
    <span>Municipal Council</span>
  </div>
  <nav class="kmc-nav">
    <a href="admin-dashboard.html">All Submissions</a>
    <a href="admin-employees.html" class="active-tab">Employees</a>
  </nav>
  <div class="admin-profile">
    <span id="adminName">Admin</span>
    <div class="profile-circle" id="adminInitial">A</div>
    <button id="adminLogoutBtn" class="btn-logout" type="button">&#x2192; Sign Out</button>
  </div>
</header>

<main class="main">

  <div id="superOnlyNotice" class="super-only-notice" style="display:none;">
    You are logged in as an <strong>Officer</strong>. Employee management (add / deactivate) is restricted to Super Admins.
  </div>

  <!-- ADD EMPLOYEE FORM (super_admin only) -->
  <div id="addSection">
    <div class="emp-form-panel">
      <h3>Add New Employee</h3>
      <div class="emp-form-row">
        <div class="emp-form-group">
          <label for="empFullName">Full Name *</label>
          <input type="text" id="empFullName" placeholder="e.g. Kamal Perera" />
        </div>
        <div class="emp-form-group">
          <label for="empId">Employee ID</label>
          <input type="text" id="empId" placeholder="e.g. EMP-0012" />
        </div>
      </div>
      <div class="emp-form-row">
        <div class="emp-form-group">
          <label for="empUsername">Username *</label>
          <input type="text" id="empUsername" placeholder="Login username" autocomplete="off" />
        </div>
        <div class="emp-form-group">
          <label for="empRole">Role *</label>
          <select id="empRole">
            <option value="officer">Officer</option>
            <option value="super_admin">Super Admin</option>
          </select>
        </div>
      </div>
      <div class="emp-form-row">
        <div class="emp-form-group">
          <label for="empPass">Password *</label>
          <input type="password" id="empPass" placeholder="Set a strong password" autocomplete="new-password" />
        </div>
        <div class="emp-form-group">
          <label for="empPassConfirm">Confirm Password *</label>
          <input type="password" id="empPassConfirm" placeholder="Re-enter password" autocomplete="new-password" />
        </div>
      </div>
      <div class="emp-msg" id="addMsg"></div>
      <button id="addBtn" class="btn-primary">Add Employee</button>
    </div>
  </div>

  <!-- EMPLOYEE LIST -->
  <div class="section-header">
    <h2>Office Employees</h2>
  </div>

  <div class="panel" style="overflow-x:auto;">
    <table class="emp-table">
      <thead>
        <tr>
          <th>Employee ID</th>
          <th>Full Name</th>
          <th>Username</th>
          <th>Role</th>
          <th>Status</th>
          <th>Added On</th>
          <th id="actionColHeader">Action</th>
        </tr>
      </thead>
      <tbody id="empTableBody">
        <tr><td colspan="7">Loading...</td></tr>
      </tbody>
    </table>
  </div>

</main>

<script>
const API = API_BASE;

// --- Auth check ---
const rawAdmin = localStorage.getItem("admin_user");
if (!rawAdmin) { window.location.href = "index.html"; }

const me = JSON.parse(rawAdmin);
const resolvedName = me.display_name || me.username || "";
const isSuperAdmin =
  me.role === "super_admin" ||
  String(me.username || "").toLowerCase() === "admin" ||
  String(resolvedName).toLowerCase().includes("system admin");

document.getElementById("adminName").textContent = me.display_name || me.username;
document.getElementById("adminInitial").textContent = (me.display_name || me.username || "A")[0].toUpperCase();

document.getElementById("adminLogoutBtn").addEventListener("click", () => {
  localStorage.removeItem("admin_user");
  window.location.href = "index.html";
});

// Show/hide add form based on role
if (!isSuperAdmin) {
  document.getElementById("addSection").style.display = "none";
  document.getElementById("superOnlyNotice").style.display = "block";
  document.getElementById("actionColHeader").style.display = "none";
}

// --- Load employee list ---
async function loadEmployees() {
  try {
    const resp = await fetch(`${API}/admin/employees?requestedById=${me.id}`);
    if (!resp.ok) throw new Error("Failed to load employees");
    const list = await resp.json();
    renderTable(list);
  } catch (e) {
    document.getElementById("empTableBody").innerHTML =
      `<tr><td colspan="7" style="color:#9b0000;">${e.message}</td></tr>`;
  }
}

function renderTable(list) {
  const tbody = document.getElementById("empTableBody");
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="7">No employees found.</td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(emp => {
    const roleBadge = emp.role === "super_admin"
      ? `<span class="badge-role badge-super">Super Admin</span>`
      : `<span class="badge-role badge-officer">Officer</span>`;
    const statusBadge = emp.is_active
      ? `<span class="badge-active">Active</span>`
      : `<span class="badge-inactive">Inactive</span>`;
    const added = new Date(emp.created_at).toLocaleDateString("en-GB", { day:"2-digit", month:"short", year:"numeric" });

    let actionBtn = "";
    if (isSuperAdmin) {
      if (emp.id === me.id) {
        actionBtn = `<span style="font-size:0.78rem;color:#aaa;">You</span>`;
      } else if (emp.is_active) {
        actionBtn = `<button class="btn-small" style="background:#fee2e2;color:#991b1b;border-color:#fca5a5;"
          onclick="setActive(${emp.id}, false)">Deactivate</button>`;
      } else {
        actionBtn = `<button class="btn-small" style="background:#dcfce7;color:#166534;border-color:#86efac;"
          onclick="setActive(${emp.id}, true)">Reactivate</button>`;
      }
    }

    return `<tr>
      <td>${emp.employee_id || '-'}</td>
      <td>${emp.full_name || '-'}</td>
      <td>${emp.username}</td>
      <td>${roleBadge}</td>
      <td>${statusBadge}</td>
      <td>${added}</td>
      <td>${actionBtn}</td>
    </tr>`;
  }).join("");
}

// --- Add employee ---
document.getElementById("addBtn").addEventListener("click", async () => {
  const fullName = document.getElementById("empFullName").value.trim();
  const empId    = document.getElementById("empId").value.trim();
  const username = document.getElementById("empUsername").value.trim();
  const role     = document.getElementById("empRole").value;
  const pass     = document.getElementById("empPass").value;
  const passConf = document.getElementById("empPassConfirm").value;
  const msg      = document.getElementById("addMsg");

  msg.style.color = "#9b0000";

  if (!fullName || !username || !pass) {
    msg.textContent = "Full name, username, and password are required."; return;
  }
  if (pass.length < 6) {
    msg.textContent = "Password must be at least 6 characters."; return;
  }
  if (pass !== passConf) {
    msg.textContent = "Passwords do not match."; return;
  }

  msg.style.color = "#555";
  msg.textContent = "Adding employee...";

  try {
    const resp = await fetch(`${API}/admin/employees`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ requestedById: me.id, employee_id: empId, full_name: fullName, username, password: pass, role })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || "Failed to add employee");

    msg.style.color = "#057a20";
    msg.textContent = `Employee "${fullName}" added successfully.`;

    // Clear form
    ["empFullName","empId","empUsername","empPass","empPassConfirm"].forEach(id => {
      document.getElementById(id).value = "";
    });
    document.getElementById("empRole").value = "officer";

    loadEmployees();
  } catch (e) {
    msg.style.color = "#9b0000";
    msg.textContent = e.message;
  }
});

// --- Deactivate / Reactivate ---
window.setActive = async (empId, isActive) => {
  const action = isActive ? "reactivate" : "deactivate";
  if (!confirm(`Are you sure you want to ${action} this employee?`)) return;

  try {
    const resp = await fetch(`${API}/admin/employees/${empId}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ requestedById: me.id, is_active: isActive })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || "Failed to update status");
    loadEmployees();
  } catch (e) {
    alert("Error: " + e.message);
  }
};

loadEmployees();
</script>
</body>
</html>
